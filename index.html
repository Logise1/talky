<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talky - Simulador</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div id="login-screen" class="screen">
        <div class="login-container card">
            <h2>Bienvenido a Talky</h2>
            <p>Configura tu perfil para empezar a chatear.</p>
            <form id="login-form">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" required placeholder="tu@email.com">
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" required placeholder="********">
                </div>

                <div id="register-fields" class="hidden">
                    <div class="input-group">
                        <label>Nombre</label>
                        <input type="text" id="name" placeholder="Ej: Alex">
                    </div>
                    <div class="input-group">
                        <label>Edad</label>
                        <input type="number" id="age" placeholder="Ej: 16">
                    </div>
                    <div class="input-group">
                        <label>¿Cómo eres?</label>
                        <textarea id="profile" placeholder="Me gustan los videojuegos y la música..."></textarea>
                    </div>
                </div>

                <div id="auth-error" class="hidden" style="color: #ef4444; font-size: 0.85rem; margin-bottom: 1rem;">
                </div>

                <button type="submit" class="btn-primary" id="auth-btn">Entrar</button>
                <p class="auth-switch" id="auth-switch">¿No tienes cuenta? <span>Regístrate aquí</span></p>
            </form>
        </div>
    </div>

    <div id="loading-screen" class="screen hidden">
        <div class="spinner"></div>
        <p>Cargando simulador<span class="dots">...</span></p>
    </div>

    <div id="app-screen" class="screen hidden">
        <div class="app-container">
            <aside class="sidebar">
                <header class="sidebar-header">
                    <h3 id="user-display-name">Talky</h3>
                    <div style="display:flex; gap: 0.5rem;">
                        <button id="profile-btn" title="Mi Perfil"
                            style="background: rgba(255,255,255,0.1); border: none; color: white; cursor: pointer; border-radius: 8px; width: 36px; height: 36px; display: flex; justify-content: center; align-items: center; transition: background 0.2s ease;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                        </button>
                        <button id="memories-btn" title="Memorias"
                            style="background: rgba(255,255,255,0.1); border: none; color: white; cursor: pointer; border-radius: 8px; width: 36px; height: 36px; display: flex; justify-content: center; align-items: center; transition: background 0.2s ease;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z">
                                </path>
                            </svg>
                        </button>
                        <button id="new-group-btn" title="Nuevo Grupo"
                            style="background: rgba(255,255,255,0.1); border: none; color: white; cursor: pointer; border-radius: 8px; width: 36px; height: 36px; display: flex; justify-content: center; align-items: center; transition: background 0.2s ease;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M12 5v14M5 12h14" />
                            </svg>
                        </button>
                        <button id="logout-btn" title="Cerrar sesión"
                            style="background: rgba(239, 68, 68, 0.2); border: none; color: #ef4444; cursor: pointer; border-radius: 8px; width: 36px; height: 36px; display: flex; justify-content: center; align-items: center; transition: background 0.2s ease;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                                <polyline points="16 17 21 12 16 7"></polyline>
                                <line x1="21" y1="12" x2="9" y2="12"></line>
                            </svg>
                        </button>
                    </div>
                </header>
                <div class="chat-list" id="chat-list">
                    <!-- Chats will be generated here -->
                </div>
            </aside>
            <main class="chat-area">
                <header class="chat-header hidden">
                    <button id="mobile-back-btn" class="mobile-back-btn" style="display: none;" title="Volver">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <line x1="19" y1="12" x2="5" y2="12"></line>
                            <polyline points="12 19 5 12 12 5"></polyline>
                        </svg>
                    </button>
                    <div class="chat-title" id="active-chat-title">Selecciona un chat</div>
                </header>
                <div class="chat-messages" id="chat-messages">
                    <div class="empty-state">Selecciona un chat para empezar</div>
                </div>
                <div class="reply-preview-container hidden" id="reply-preview-container">
                    <div class="reply-preview-content">
                        <div class="reply-preview-sender" id="reply-preview-sender"></div>
                        <div class="reply-preview-text" id="reply-preview-text"></div>
                    </div>
                    <button class="reply-cancel-btn" id="reply-cancel-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M18 6L6 18M6 6l12 12" />
                        </svg>
                    </button>
                </div>
                <div class="chat-input hidden" id="chat-input-container">
                    <input type="text" id="message-input" placeholder="Escribe un mensaje..." autocomplete="off">
                    <button class="btn-send" id="send-btn">
                        <svg viewBox="0 0 24 24" fill="none" class="send-icon">
                            <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </button>
                </div>
            </main>
        </div>
    </div>

    <div id="memories-modal" class="screen hidden" style="background: rgba(0,0,0,0.8); z-index: 100;">
        <div class="card" style="max-width: 500px; max-height: 80vh; display: flex; flex-direction: column;">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h2>Memorias Internas</h2>
                <button id="close-memories-btn"
                    style="background: transparent; border: none; color: #94a3b8; cursor: pointer;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <p>Lo que los bots recuerdan sobre ti basándose en las conversaciones.</p>
            <div id="memories-list"
                style="overflow-y: auto; flex-grow: 1; padding-right: 0.5rem; display: flex; flex-direction: column; gap: 1rem;">
                <!-- Memories mapped here -->
            </div>
        </div>
    </div>

    <div id="profile-modal" class="screen hidden" style="background: rgba(0,0,0,0.8); z-index: 100;">
        <div class="card" style="max-width: 400px; display: flex; flex-direction: column;">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h2>Mi Perfil</h2>
                <button id="close-profile-btn"
                    style="background: transparent; border: none; color: #94a3b8; cursor: pointer;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="input-group">
                <label>Nombre</label>
                <input type="text" id="edit-name">
            </div>
            <div class="input-group">
                <label>Edad</label>
                <input type="number" id="edit-age">
            </div>
            <div class="input-group">
                <label>¿Cómo eres?</label>
                <textarea id="edit-profile" rows="3"></textarea>
            </div>
            <button id="save-profile-btn" class="btn-primary" style="margin-top: 1rem;">Guardar Cambios</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
